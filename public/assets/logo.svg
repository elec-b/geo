<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="grad" gradientUnits="userSpaceOnUse" x1="56" y1="456" x2="456" y2="56">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#404040"/>
    </linearGradient>

    <radialGradient id="fill" cx="35%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#1a1a1a" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#0a0a0a" stop-opacity="0"/>
    </radialGradient>

    <clipPath id="gc">
      <circle cx="256" cy="256" r="199"/>
    </clipPath>
  </defs>

  <!-- Relleno sutil para volumen -->
  <circle cx="256" cy="256" r="199" fill="url(#fill)"/>

  <!-- Glow de las líneas del grid -->
  <g clip-path="url(#gc)" fill="none" stroke="url(#grad)" stroke-width="12" opacity="0.1" stroke-linecap="round">
    <path d="M83,156 Q256,168 429,156"/>
    <path d="M56,260 Q256,286 456,260"/>
    <path d="M83,362 Q256,396 429,362"/>
    <path d="M256,56 A173,200 0 0,0 256,456"/>
    <path d="M256,56 A100,200 0 0,0 256,456"/>
    <line x1="256" y1="56" x2="256" y2="456"/>
    <path d="M256,56 A100,200 0 0,1 256,456"/>
    <path d="M256,56 A173,200 0 0,1 256,456"/>
  </g>

  <!-- Líneas del grid -->
  <g clip-path="url(#gc)" fill="none" stroke="url(#grad)" stroke-width="3" stroke-linecap="round">
    <path d="M83,156 Q256,168 429,156"/>
    <path d="M56,260 Q256,286 456,260"/>
    <path d="M83,362 Q256,396 429,362"/>
    <path d="M256,56 A173,200 0 0,0 256,456"/>
    <path d="M256,56 A100,200 0 0,0 256,456"/>
    <line x1="256" y1="56" x2="256" y2="456"/>
    <path d="M256,56 A100,200 0 0,1 256,456"/>
    <path d="M256,56 A173,200 0 0,1 256,456"/>
  </g>

  <!-- Glow del contorno -->
  <circle cx="256" cy="256" r="200" fill="none" stroke="url(#grad)" stroke-width="12" opacity="0.1"/>

  <!-- Contorno del globo -->
  <circle cx="256" cy="256" r="200" fill="none" stroke="url(#grad)" stroke-width="4"/>
</svg>
