<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Exploris</title>
    <style>
      /* Splash screen inline - se muestra antes de que cargue React */
      body {
        margin: 0;
        background: #04060a;
      }
      .splash {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: #04060a;
        color: #ffffff;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      }
      .splash-spinner {
        width: 48px;
        height: 48px;
        border: 3px solid rgba(96, 165, 250, 0.2);
        border-top-color: #60a5fa;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }
      .splash-text {
        margin-top: 1rem;
        font-size: 0.875rem;
        color: #a1a1aa;
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <!-- Splash screen: React lo reemplaza al montar -->
      <div class="splash">
        <div class="splash-spinner"></div>
        <p class="splash-text">Cargando globo...</p>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
